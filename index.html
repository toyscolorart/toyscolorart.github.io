<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ToysColorArt</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #add8e6; }
        .container { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        #canvas { border: 5px solid #333; background: white; padding: 20px; }
        .palette { display: grid; grid-template-columns: repeat(4, 30px); gap: 10px; background: #333; padding: 15px; border-radius: 10px; }
        .color { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>
    <h1>¡Bienvenido a ToysColorArt!</h1>
    <div class="container">
        <div id="canvas">
            <!-- Aquí irá tu dibujo SVG -->
            <svg width="200" height="200" onclick="pintar(event)">
                <circle id="parte1" cx="100" cy="100" r="50" fill="white" stroke="black" stroke-width="2"/>
            </svg>
        </div>
        <div class="palette" id="palette"></div>
    </div>

    <script>
        let colorActual = 'red';
        const colores = ['#8B0000', '#FF0000', '#FF4500', '#FFD700', '#00FF00', '#008000', '#0000FF', '#4B0082'];
        
        const palette = document.getElementById('palette');
        colores.forEach(c => {
            let div = document.createElement('div');
            div.className = 'color';
            div.style.backgroundColor = c;
            div.onclick = () => colorActual = c;
            palette.appendChild(div);
        });

        function pintar(e) {
            if(e.target.tagName === 'circle') e.target.setAttribute('fill', colorActual);
        }
    </script>
</body>
</html>
