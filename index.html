<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Colorear ToysColorArt</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #fdfbf7; padding: 20px; }
        h1 { color: #333; }
        #canvas-container { margin: 20px auto; border: 2px solid #ccc; padding: 20px; background: white; width: fit-content; border-radius: 10px; }
        .coloreable { cursor: pointer; transition: 0.3s; }
        .coloreable:hover { stroke: #ffcc00; stroke-width: 4px; }
        #selector-color { margin-top: 20px; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Bienvenido a ToysColorArt</h1>
    <p>¡Haz clic en las partes del dibujo para pintarlas!</p>
    
    <input type="color" id="selector-color" value="#ff0000">
    
    <div id="canvas-container">
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle id="petalo-1" class="coloreable" cx="100" cy="70" r="30" fill="white" stroke="black" stroke-width="2"/>
            <circle id="petalo-2" class="coloreable" cx="130" cy="100" r="30" fill="white" stroke="black" stroke-width="2"/>
            <circle id="petalo-3" class="coloreable" cx="100" cy="130" r="30" fill="white" stroke="black" stroke-width="2"/>
            <circle id="petalo-4" class="coloreable" cx="70" cy="100" r="30" fill="white" stroke="black" stroke-width="2"/>
            <circle id="centro" class="coloreable" cx="100" cy="100" r="20" fill="white" stroke="black" stroke-width="2"/>
        </svg>
    </div>

    <script>
        document.querySelectorAll('.coloreable').forEach(item => {
            item.addEventListener('click', (e) => {
                const color = document.getElementById('selector-color').value;
                e.target.style.fill = color;
            });
        });
    </script>
</body>
</html>
